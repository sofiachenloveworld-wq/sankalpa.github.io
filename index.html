<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sankalpa心念 - 疗愈音乐空间</title>
    <style>
        :root {
            --bg-page: #f1ece4;       
            --bg-card: #e5ddd3;       
            --text-main: #3e2723;     
        }

        body {
            margin: 0; padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
        }

        .banner-container { width: 100%; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; }
        .pc-banner { display: block; }
        .mobile-banner { display: none; }
        @media (max-width: 768px) { .pc-banner { display: none; } .mobile-banner { display: block; } }

        .container {
            max-width: 1200px; width: 92%;
            padding: 30px 0 150px 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        .music-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 12px 12px 20px 12px;
            display: flex; flex-direction: column;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .cover-box {
            width: 100%; aspect-ratio: 1 / 1;
            border-radius: 12px; overflow: hidden;
            position: relative;
        }
        .cover-img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 播放图标容器 --- */
        .play-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }

        /* 基础图标：三角形 */
        .icon-shape {
            width: 0; height: 0; 
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 13px solid white;
            margin-left: 4px;
            transition: all 0.1s ease;
        }

        /* 播放状态：紧凑的双竖线 */
        .playing .icon-shape {
            width: 10px; height: 14px; /* 稍微缩小宽度让它更精致 */
            border: none;
            border-left: 3.5px solid white;  /* 竖线宽度 */
            border-right: 3.5px solid white; /* 竖线宽度 */
            margin-left: 0;
            /* 关键：调整竖线间距，通过中间留白 */
            background: transparent;
        }

        .info { padding-top: 12px; text-align: center; }
        .title {
            font-size: 0.85em; font-weight: 700; line-height: 1.4;
            min-height: 2.8em;
            display: flex; align-items: center; justify-content: center;
        }

        .player-bar {
            position: fixed; bottom: 20px;
            width: 90%; max-width: 500px;
            background: rgba(229, 221, 211, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 100px; padding: 10px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000;
        }
        #currentPlaying { font-size: 0.75em; font-weight: 700; margin-bottom: 5px; }
        audio { width: 100%; height: 32px; filter: sepia(20%); }

        /* 高亮正在操作的卡片 */
        .active-card { outline: 2.5px solid var(--text-main); }
    </style>
</head>
<body>

<div class="banner-container">
    <img src="banner-pc.jpg" class="banner-img pc-banner" alt="sankalpa">
    <img src="banner-m.jpg" class="banner-img mobile-banner" alt="sankalpa">
</div>

<div class="container" id="musicList"></div>

<div class="player-bar">
    <div id="currentPlaying">sankalpa心念：待开启</div>
    <audio id="mainPlayer" controls></audio>
</div>
