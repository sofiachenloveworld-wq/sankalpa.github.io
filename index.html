<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sankalpa心念 - 疗愈音乐空间</title>
    <style>
        :root {
            /* 严格使用样稿中的小麦色和深咖色 */
            --bg-page: #f1ece4;       /* 整体奶茶色底色 */
            --bg-card: #e5ddd3;       /* 样稿中的小麦色卡片底色 */
            --text-main: #3e2723;     /* 深咖色控件与文字 */
            --accent: #a1887f;        /* 辅助褐色 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Banner 零裁切 --- */
        .banner-container { width: 100%; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; }
        .pc-banner { display: block; }
        .mobile-banner { display: none; }
        @media (max-width: 768px) { .pc-banner { display: none; } .mobile-banner { display: block; } }

        /* --- 容器布局 --- */
        .container {
            max-width: 1200px;
            width: 90%;
            padding: 40px 0 160px 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
        }
        @media (max-width: 1024px) { .container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }

        /* --- 终极复刻卡片：完全按照样稿结构 --- */
        .music-card {
            background: var(--bg-card);
            border-radius: 30px; /* 大圆角卡片 */
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            /* 严格复刻样稿的留白 */
            padding: 20px 20px 30px 20px; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .music-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(78, 52, 46, 0.12);
        }

        /* 封面图容器：实现留边与圆角嵌套 */
        .cover-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 20px; /* 图片的内层圆角 */
            overflow: hidden;
            margin-bottom: 20px;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 标题排版 */
        .info {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 0.9em;
            font-weight: 400; /* 清雅字体 */
            letter-spacing: 0.5px;
            line-height: 1.4;
            color: var(--text-main);
            min-height: 2.8em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 复刻样稿的播放控件区 --- */
        .card-controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* 模拟进度条 */
        .fake-progress {
            width: 80%;
            height: 2px;
            background-color: rgba(62, 39, 35, 0.2);
            position: relative;
        }
        .fake-progress::after {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 6px; height: 6px;
            background-color: var(--text-main);
            border-radius: 50%;
        }

        /* 模拟控制按钮 ($\blacktriangleleft \blacktriangleleft$, $II$, $\blacktriangleright \blacktriangleright$) */
        .fake-buttons {
            display: flex;
            align-items: center;
            gap: 30px;
            font-size: 1.2em;
            color: var(--text-main);
            opacity: 0.8;
        }
        .play-btn {
            width: 35px;
            height: 35px;
            border: 2px solid var(--text-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
        }

        /* --- 实际播放器 - 隐藏但发挥功能 --- */
        .player-bar {
            position: fixed;
            bottom: 25px;
            width: 85%;
            max-width: 550px;
            background: rgba(229, 221, 211, 0.95); /* 使用卡片小麦色 */
            backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 12px 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            display: none; /* 初始隐藏，点击后显示 */
        }
        #currentPlaying { font-size: 0.85em; font-weight: 700; margin-bottom: 5px; color: var(--text-main); }
        audio { width: 100%; height: 35px; filter: sepia(20%) contrast(90%); }

        .active-card { border: 2px solid var(--text-main); }
    </style>
</head>
<body>

<div class="banner-container">
    <img src="banner-pc.jpg" class="banner-img pc-banner" alt="sankalpa">
    <img src="banner-m.jpg" class="banner-img mobile-banner" alt="sankalpa">
</div>

<div class="container" id="musicList"></div>

<div class="player-bar" id="playerBar">
    <div id="currentPlaying">已备好，请开启心念</div>
    <audio id="mainPlayer" controls></audio>
</div>

<script>
    const baseUrl = "https://sankalpamusic-1301330489.cos.ap-guangzhou.myqcloud.com/";
    const songs = [
        { id: 1, title: "【432Hz步入灵境】西藏禅宗声音疗愈" },
        { id: 2, title: "432Hz-宇宙和谐治愈震动-提升Energy" },
        { id: 3, title: "528Hz盖亚之爱：疗愈心轮拥抱爱与慈悲" },
        { id: 4, title: "528Hz-内心深处的和平与平静" },
        { id: 5, title: "【灵气音乐】长笛与颂钵，内心的平静与和谐" },
        { id: 6, title: "528Hz内在疗愈-你所渴望的早已属于你" },
        { id: 7, title: "【爱的频率】拥抱你的內在小孩-自我接纳" },
        { id: 8, title: "888Hz-显化丰盛" },
        { id: 9, title: "528Hz-DNA修复频率：唤醒治愈力量" },
        { id: 10, title: "396Hz-平静的声音治愈-放下所有忧虑" }
    ];

    const musicList = document.getElementById('musicList');
    const player = document.getElementById('mainPlayer');
    const playerBar = document.getElementById('playerBar');
    const playingText = document.getElementById('currentPlaying');

    songs.forEach(song => {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
            <div class="cover-box">
                <img src="cover${song.id}.jpg" class="cover-img">
            </div>
            <div class="info">
                <div class="title">${song.title}</div>
            </div>
            <div class="card-controls">
                <div class="fake-progress"></div>
                <div class="fake-buttons">
                    <div>$\blacktriangleleft \blacktriangleleft$</div>
                    <div class="play-btn">$II$</div>
                    <div>$\blacktriangleright \blacktriangleright$</div>
                </div>
            </div>
        `;
        card.onclick = () => {
            player.src = `${baseUrl}${song.id}.mp3`;
            player.play();
            playerBar.style.display = 'flex'; // 显示底部播放器
            playingText.innerText = `正在播放: ${song.title}`;
            document.querySelectorAll('.music-card').forEach(c => c.classList.remove('active-card'));
            card.classList.add('active-card');
        };
        musicList.appendChild(card);
    });
</script>
</body>
</html>
