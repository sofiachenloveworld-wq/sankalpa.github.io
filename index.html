<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sankalpa心念 - 疗愈音乐空间</title>
    <style>
        :root { --bg-page: #f1ece4; --bg-card: #e5ddd3; --text-main: #3e2723; }
        body { margin: 0; padding: 0; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background-color: var(--bg-page); color: var(--text-main); display: flex; flex-direction: column; align-items: center; }
        .banner-container { width: 100%; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; }
        .pc-banner { display: block; } .mobile-banner { display: none; }
        @media (max-width: 768px) { .pc-banner { display: none; } .mobile-banner { display: block; } }
        .container { max-width: 1200px; width: 92%; padding: 30px 0 150px 0; display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; min-height: 200px; }
        @media (max-width: 768px) { .container { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
        .music-card { background: var(--bg-card); border-radius: 20px; padding: 12px; display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .cover-box { width: 100%; aspect-ratio: 1 / 1; border-radius: 12px; overflow: hidden; position: relative; background: #dcd1c1; }
        .cover-img { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 44px; height: 44px; background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(4px); border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .icon-shape { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 13px solid white; margin-left: 4px; }
        .playing .icon-shape { width: 8px; height: 14px; border-left: 3px solid white; border-right: 3px solid white; border-top: 0; border-bottom: 0; margin-left: 0; background: transparent; }
        .info { padding-top: 12px; text-align: center; }
        .title { font-size: 0.85em; font-weight: 700; line-height: 1.4; min-height: 2.8em; display: flex; align-items: center; justify-content: center; }
        .player-bar { position: fixed; bottom: 20px; width: 90%; max-width: 500px; background: rgba(229, 221, 211, 0.95); backdrop-filter: blur(20px); border-radius: 100px; padding: 10px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        #currentPlaying { font-size: 0.75em; font-weight: 700; margin-bottom: 5px; }
        audio { width: 100%; height: 32px; }
        .active-card { outline: 2.5px solid var(--text-main); }
    </style>
</head>
<body>

<div class="banner-container">
    <img src="banner-pc.jpg" class="banner-img pc-banner" alt="sankalpa">
    <img src="banner-m.jpg" class="banner-img mobile-banner" alt="sankalpa">
</div>

<div class="container" id="musicList"></div>

<div class="player-bar">
    <div id="currentPlaying">sankalpa心念：待开启</div>
    <audio id="mainPlayer" controls></audio>
</div>

<script>
    const baseUrl = "https://sankalpamusic-1301330489.cos.ap-guangzhou.myqcloud.com/";
    const songs = [
        { id: 1, title: "【432Hz步入灵境】西藏禅宗声音疗愈" },
        { id: 2, title: "432Hz-宇宙和谐治愈震动-提升Energy" },
        { id: 3, title: "528Hz盖亚之爱：疗愈心轮拥抱爱与慈悲" },
        { id: 4, title: "528Hz-内心深处的和平与平静" },
        { id: 5, title: "【灵气音乐】长笛与颂钵，内心的平静与和谐" },
        { id: 6, title: "528Hz内在疗愈-你所渴望的早已属于你" },
        { id: 7, title: "【爱的频率】拥抱你的內在小孩-自我接纳" },
        { id: 8, title: "888Hz-显化丰盛" },
        { id: 9, title: "528Hz-DNA修复频率：唤醒治愈力量" },
        { id: 10, title: "396Hz-平静的声音治愈-放下所有忧虑" }
    ];

    function renderCards() {
        const musicList = document.getElementById('musicList');
        if (!musicList || musicList.children.length > 0) return; // 避免重复生成

        songs.forEach(song => {
            const card = document.createElement('div');
            card.className = 'music-card';
            card.innerHTML = `
                <div class="cover-box">
                    <div class="play-overlay"><div class="icon-shape"></div></div>
                    <img src="cover${song.id}.jpg" class="cover-img">
                </div>
                <div class="info"><div class="title">${song.title}</div></div>
            `;
            
            card.onclick = () => {
                const player = document.getElementById('mainPlayer');
                const playingText = document.getElementById('currentPlaying');
                const songUrl = `${baseUrl}${song.id}.mp3`;
                
                if (player.src === songUrl) {
                    player.paused ? player.play() : player.pause();
                } else {
                    player.src = songUrl;
                    player.play();
                    playingText.innerText = `正在播放: ${song.title}`;
                    document.querySelectorAll('.music-card').forEach(c => c.classList.remove('active-card', 'playing'));
                    card.classList.add('active-card');
                }
            };
            musicList.appendChild(card);
        });
    }

    // 立即运行
    renderCards();
    // 1秒后再运行一次（双保险，防止某些浏览器渲染过慢）
    setTimeout(renderCards, 1000);

    const player = document.getElementById('mainPlayer');
    player.onplay = () => { document.querySelector('.active-card')?.classList.add('playing'); };
    player.onpause = () => { document.querySelector('.active-card')?.classList.remove('playing'); };
</script>
</body>
</html>
