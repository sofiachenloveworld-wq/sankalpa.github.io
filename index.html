<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sankalpa心念 - 疗愈音乐空间</title>
    <style>
        :root {
            --bg-page: #f1ece4;       /* 大地奶茶色底色 */
            --bg-card: #d7c4a3;       /* 核心小麦色 */
            --glass-border: rgba(161, 136, 127, 0.4); 
            --text-main: #3e2723;     /* 更深一点的咖色，配合粗体 */
            --accent: #a1887f;        
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .banner-container { width: 100%; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; }
        .pc-banner { display: block; }
        .mobile-banner { display: none; }
        @media (max-width: 768px) { .pc-banner { display: none; } .mobile-banner { display: block; } }

        .container {
            max-width: 1200px;
            width: 90%;
            padding: 40px 0 160px 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
        }
        @media (max-width: 1024px) { .container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }

        /* --- 调整后的卡片：增加留边设计 --- */
        .music-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 28px; /* 稍微大一点的圆角 */
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            padding: 15px; /* 这里是关键：为图片和文字四周留出空白 */
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .music-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(78, 52, 46, 0.12);
        }

        .cover-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            border-radius: 18px; /* 图片容器的圆角 */
            overflow: hidden;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px; /* 图片自身的圆角 */
            transition: transform 0.5s ease;
        }

        /* 播放图标遮罩 */
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            opacity: 0; /* 默认隐藏，hover显示 */
            transition: opacity 0.3s;
        }
        .play-overlay::after {
            content: '';
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid white;
            margin-left: 4px;
        }
        .music-card:hover .play-overlay { opacity: 1; }

        .info {
            padding-top: 15px;
            text-align: center;
        }

        /* 字体加粗与样式优化 */
        .title {
            font-size: 0.95em;
            font-weight: 700; /* 加粗字体 */
            letter-spacing: 0.5px;
            line-height: 1.4;
            color: var(--text-main);
            min-height: 2.8em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-bar {
            position: fixed;
            bottom: 25px;
            width: 85%;
            max-width: 550px;
            background: rgba(215, 196, 163, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 12px 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        #currentPlaying { font-size: 0.85em; font-weight: 700; margin-bottom: 5px; }
        audio { width: 100%; height: 35px; filter: sepia(20%) contrast(90%); }

        .active-card { border: 2px solid var(--text-main); }
    </style>
</head>
<body>

<div class="banner-container">
    <img src="banner-pc.jpg" class="banner-img pc-banner" alt="sankalpa">
    <img src="banner-m.jpg" class="banner-img mobile-banner" alt="sankalpa">
</div>

<div class="container" id="musicList"></div>

<div class="player-bar">
    <div id="currentPlaying">已备好，请开启心念</div>
    <audio id="mainPlayer" controls></audio>
</div>

<script>
    const baseUrl = "https://sankalpamusic-1301330489.cos.ap-guangzhou.myqcloud.com/";
    const songs = [
        { id: 1, title: "【432Hz步入灵境】西藏禅宗声音疗愈" },
        { id: 2, title: "432Hz-宇宙和谐治愈震动-提升Energy" },
        { id: 3, title: "528Hz盖亚之爱：疗愈心轮拥抱爱与慈悲" },
        { id: 4, title: "528Hz-内心深处的和平与平静" },
        { id: 5, title: "【灵气音乐】长笛与颂钵，内心的平静与和谐" },
        { id: 6, title: "528Hz内在疗愈-你所渴望的早已属于你" },
        { id: 7, title: "【爱的频率】拥抱你的內在小孩-自我接纳" },
        { id: 8, title: "888Hz-显化丰盛" },
        { id: 9, title: "528Hz-DNA修复频率：唤醒治愈力量" },
        { id: 10, title: "396Hz-平静的声音治愈-放下所有忧虑" }
    ];

    const musicList = document.getElementById('musicList');
    const player = document.getElementById('mainPlayer');
    const playingText = document.getElementById('currentPlaying');

    songs.forEach(song => {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
            <div class="cover-box">
                <div class="play-overlay"></div>
                <img src="cover${song.id}.jpg" class="cover-img">
            </div>
            <div class="info">
                <div class="title">${song.title}</div>
            </div>
        `;
        card.onclick = () => {
            player.src = `${baseUrl}${song.id}.mp3`;
            player.play();
            playingText.innerText = `正在播放: ${song.title}`;
            document.querySelectorAll('.music-card').forEach(c => c.classList.remove('active-card'));
            card.classList.add('active-card');
        };
        musicList.appendChild(card);
    });
</script>
</body>
</html>
